<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Shop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { margin-top: 0; color: #111827; font-size: 1.5rem; text-align: center; }
        p { color: #6b7280; font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #374151; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background-color: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        button:hover { background-color: #2563eb; }
        #message { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; display: none; font-size: 0.85rem; }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
    </style>
</head>
<body>

<div class="card">
    <h1>My Awesome Shop 🛒</h1>
    <p>Sign up here to buy things! (This uses AuthForge under the hood)</p>

    <form id="signup-form">
        <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" required>
        </div>
        <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required minlength="6">
        </div>
        <button type="submit" id="submit-btn">Register for Awesome Shop</button>
    </form>

    <div id="message"></div>
</div>

<script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('message');
        
        btn.textContent = 'Registering...';
        btn.disabled = true;
        msg.style.display = 'none';

        const data = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        };

        try {
            // Notice how this external app points directly to your AuthForge backend!
            const response = await fetch('http://localhost:3000/api/v1/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                msg.textContent = 'Success! You are now registered in AuthForge.';
                msg.className = 'success';
                msg.style.display = 'block';
                document.getElementById('signup-form').reset();
            } else {
                msg.textContent = 'Error: ' + (result.message || 'Validation failed');
                msg.className = 'error';
                msg.style.display = 'block';
            }
        } catch (error) {
            msg.textContent = 'Network error. Make sure AuthForge backend is running on port 3000.';
            msg.className = 'error';
            msg.style.display = 'block';
        } finally {
            btn.textContent = 'Register for Awesome Shop';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
